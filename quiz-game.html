<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Challenge | Destiny Academy</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #00111f, #003366);
      color: #61abef;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 0 25px rgba(0, 150, 255, 0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .level-info {
      font-size: 1.3rem;
      color: #00ffcc;
      margin-bottom: 8px;
    }

    .question {
      font-size: 1.65rem;
      font-weight: 600;
      text-align: center;
      margin: 2rem 0;
      min-height: 100px;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      margin: 2rem 0;
    }

    .option {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      padding: 1.3rem 1.6rem;
      border-radius: 16px;
      font-size: 1.25rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .option:hover {
      background: rgba(0, 255, 204, 0.2);
      border-color: #00ffcc;
    }

    .option.selected {
      background: #00ffcc;
      color: #001024;
      border-color: #00ffcc;
    }

    .feedback {
      margin: 1.8rem 0;
      padding: 1.2rem;
      border-radius: 12px;
      font-size: 1.35rem;
      text-align: center;
      display: none;
    }

    .correct { background: #00cc88; color: white; }
    .wrong { background: #ff5555; color: white; }

    .progress {
      height: 12px;
      background: #003366;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ffcc, #0080ff);
      width: 0%;
      transition: width 0.5s ease;
    }

    .score {
      font-size: 1.45rem;
      text-align: center;
      margin: 1rem 0;
    }

    .next-btn {
      background: linear-gradient(90deg, #0080ff, #00aaff);
      color: white;
      padding: 16px 50px;
      font-size: 1.35rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      display: block;
      margin: 2rem auto 0;
    }

    .next-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="level-info">Level <span id="levelNum">1</span></div>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="score">Score: <span id="score">0</span> / <span id="total">0</span></div>
    </div>

    <div class="question" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question →</button>
  </div>

<script>
// Large Question Bank (you can keep adding more)
const questionBank = [
  // Easy Questions
  { q: "What do we call things that are alive?", options: ["Non-living things", "Living things", "Mixtures", "Gases"], correct: 1 },
  { q: "Which one is a liquid?", options: ["Stone", "Water", "Book", "Chair"], correct: 1 },
  { q: "What do living things need to grow?", options: ["Toys", "Food, water and air", "New clothes", "Games"], correct: 1 },
  { q: "A dog is an example of a...", options: ["Non-living thing", "Living thing", "Gas", "Mixture"], correct: 1 },
  { q: "Which material can you pour?", options: ["Wood", "Stone", "Water", "Book"], correct: 2 },

  // Medium Questions
  { q: "A mango tree is an example of a...", options: ["Non-living thing", "Living thing", "Gas", "Mixture"], correct: 1 },
  { q: "When you mix rice and beans, what do you get?", options: ["A solid", "A liquid", "A mixture", "A gas"], correct: 2 },
  { q: "Which material feels hard?", options: ["Cloth", "Water", "Stone", "Palm oil"], correct: 2 },
  { q: "Air is an example of...", options: ["Solid", "Liquid", "Gas", "Mixture"], correct: 2 },
  { q: "What is the environment?", options: ["Only living things", "Everything around us", "Only non-living things", "Only water"], correct: 1 },

  // Harder Questions
  { q: "Which of these is a non-living thing?", options: ["Butterfly", "Mango tree", "Stone", "Goat"], correct: 2 },
  { q: "What do we call materials that keep their shape?", options: ["Liquids", "Gases", "Solids", "Mixtures"], correct: 2 },
  { q: "Which is NOT a basic need of living things?", options: ["Food", "Water", "Air", "Toys"], correct: 3 },
  { q: "A mixture is when...", options: ["Two things become one new thing", "Two or more things are put together", "Things disappear", "Things become gas"], correct: 1 },
  { q: "Why should we take care of the environment?", options: ["Because it looks nice", "To take care of living things", "Only for fun", "Because teacher said so"], correct: 1 }
];

let currentLevel = parseInt(localStorage.getItem("currentQuizLevel")) || 1;
let currentQuestionIndex = 0;
let score = 0;

// Generate questions for this level (more questions for higher levels)
function getQuestionsForLevel(level) {
  const numQuestions = Math.min(8, 5 + Math.floor(level / 3)); // Increases with level
  let selected = [...questionBank];
  
  // Shuffle and take required number
  selected.sort(() => Math.random() - 0.5);
  return selected.slice(0, numQuestions);
}

let questions = getQuestionsForLevel(currentLevel);

const levelNum = document.getElementById("levelNum");
const questionText = document.getElementById("questionText");
const optionsDiv = document.getElementById("options");
const feedback = document.getElementById("feedback");
const nextBtn = document.getElementById("nextBtn");
const scoreDisplay = document.getElementById("score");
const progressBar = document.getElementById("progressBar");

levelNum.textContent = currentLevel;
document.getElementById("total").textContent = questions.length;

loadQuestion();

function loadQuestion() {
  const q = questions[currentQuestionIndex];
  questionText.textContent = q.q;
  
  optionsDiv.innerHTML = '';
  q.options.forEach((option, index) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = option;
    div.onclick = () => selectAnswer(index);
    optionsDiv.appendChild(div);
  });

  feedback.style.display = 'none';
  nextBtn.disabled = true;
  updateProgress();
}

function selectAnswer(selectedIndex) {
  const q = questions[currentQuestionIndex];
  const allOptions = optionsDiv.children;

  for (let opt of allOptions) opt.style.pointerEvents = 'none';

  if (selectedIndex === q.correct) {
    allOptions[selectedIndex].classList.add('selected');
    score++;
    feedback.className = 'feedback correct';
    feedback.textContent = "🌟 Excellent! That's correct!";
  } else {
    allOptions[selectedIndex].classList.add('wrong');
    allOptions[q.correct].classList.add('selected');
    feedback.className = 'feedback wrong';
    feedback.textContent = "😔 Not quite. The correct answer is highlighted.";
  }

  feedback.style.display = 'block';
  nextBtn.disabled = false;
  scoreDisplay.textContent = score;
}

function updateProgress() {
  const progress = ((currentQuestionIndex) / questions.length) * 100;
  progressBar.style.width = `${progress}%`;
}

function nextQuestion() {
  currentQuestionIndex++;

  if (currentQuestionIndex < questions.length) {
    loadQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  const totalQuestions = questions.length;
  const percentage = Math.round((score / totalQuestions) * 100);
  
  // XP increases with level
  let xpEarned = 8 + Math.floor(currentLevel * 1.2);
  if (xpEarned > 35) xpEarned = 35;

  // Update user's XP
  let user = JSON.parse(localStorage.getItem("currentUser"));
  if (user) {
    if (typeof user.xp !== "number") user.xp = 0;
    user.xp += Math.floor((percentage*xpEarned)/100);

    let users = JSON.parse(localStorage.getItem("users")) || [];
    const idx = users.findIndex(u => u.name === user.name && u.email === user.email);
    if (idx !== -1) users[idx] = user;

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(user));
  }

  // Unlock next levels
  let unlocked = parseInt(localStorage.getItem("quizUnlockedLevels")) || 5;
  if (currentLevel >= unlocked) {
    localStorage.setItem("quizUnlockedLevels", currentLevel + 3); // Unlock 3 more levels
  }

  // Final Screen
  document.querySelector('.container').innerHTML = `
    <div style="text-align:center; padding: 4rem 1rem;">
      <h1 style="font-size:3.5rem; color:#00ffcc;">🎉 Quiz Complete!</h1>
      <p style="font-size:2.2rem; margin:2rem 0;">${score} / ${totalQuestions}</p>
      <p style="font-size:2.4rem; color:#a3e0ff;">${percentage}%</p>
      <p style="font-size:1.9rem; margin:2.5rem 0;">You earned <strong>+${Math.floor((percentage*xpEarned)/100)} XP</strong>!</p>
      
      <button onclick="goBack()" style="background:#0080ff; color:white; padding:18px 60px; border:none; border-radius:50px; font-size:1.5rem; cursor:pointer;">
        Back to Levels
      </button>
    </div>
  `;
}

function goBack() {
  window.location.href = "quiz.html";
}
</script>
</body>
</html>
